<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sticky positioning</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="section">
        <h2 class="header">Sticky positioning</h2>

        <ul>
            <li>Accepting</li>
            <li>Active</li>
            <li>Altimeter</li>
            <li>Airplane</li>
        </ul>
    </div>

    <div class="section">
        <div class="letter-block">B</div>
        <ul>
            <li>Bird</li>
            <li>Buzzard</li>
            <li>Bee</li>
            <li>Banana</li>
            <li>Beanstalk</li>
        </ul>
    </div>

    <div class="section">
        <div class="letter-block">C</div>
        <ul>
            <li>Calculator</li>
            <li>Cane</li>
            <li>Camera</li>
            <li>Camel</li>
        </ul>
    </div>

    <div class="section">
        <div class="letter-block">D</div>
        <ul>
            <li>Duck</li>
            <li>Dime</li>
            <li>Dipstick</li>
            <li>Drone</li>
        </ul>
    </div>

    <div class="section">
        <div class="letter-block">E</div>
        <ul>
            <li>Egg</li>
            <li>Elephant</li>
            <li>Egret</li>
        </ul>
    </div>

</html>
